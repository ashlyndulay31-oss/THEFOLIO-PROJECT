<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="contact-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8E72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB366;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#contact-grad)"/>
  
  <!-- Envelope/Contact icon -->
  <rect x="150" y="120" width="300" height="180" rx="10" fill="white" opacity="0.3"/>
  <rect x="160" y="130" width="280" height="160" rx="8" fill="rgba(255,255,255,0.2)"/>
  <path d="M 160 130 L 300 220 L 440 130" stroke="white" stroke-width="2" fill="none"/>
  
  <!-- Contact symbols -->
  <text x="300" y="300" font-size="48" text-anchor="middle" fill="white">📧</text>
  <text x="150" y="350" font-size="32" text-anchor="middle" fill="rgba(255,255,255,0.9)">✉️</text>
  <text x="450" y="350" font-size="32" text-anchor="middle" fill="rgba(255,255,255,0.9)">📱</text>
  
  <!-- Text -->
  <text x="300" y="50" font-size="32" text-anchor="middle" fill="white" font-weight="bold">Get in Touch</text>
</svg>
