<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="hero-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#hero-grad)"/>
  
  <!-- Floating circles for design -->
  <circle cx="150" cy="100" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1050" cy="500" r="120" fill="rgba(255,255,255,0.08)"/>
  <circle cx="600" cy="150" r="60" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Text -->
  <text x="600" y="250" font-size="48" text-anchor="middle" fill="white" font-weight="bold">Welcome to TheFolio</text>
  <text x="600" y="320" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.9)">Share Your Creative Portfolio</text>
  <text x="600" y="370" font-size="16" text-anchor="middle" fill="rgba(255,255,255,0.8)">Connect, inspire, and grow with our community</text>
  
  <!-- Icons -->
  <circle cx="350" cy="450" r="35" fill="rgba(255,255,255,0.2)"/>
  <text x="350" y="465" font-size="40" text-anchor="middle">📝</text>
  
  <circle cx="600" cy="450" r="35" fill="rgba(255,255,255,0.2)"/>
  <text x="600" y="465" font-size="40" text-anchor="middle">❤️</text>
  
  <circle cx="850" cy="450" r="35" fill="rgba(255,255,255,0.2)"/>
  <text x="850" y="465" font-size="40" text-anchor="middle">✨</text>
</svg>
