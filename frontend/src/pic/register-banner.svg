<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="register-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#44A08D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2B7A78;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#register-grad)"/>
  
  <!-- User profile icon background -->
  <circle cx="300" cy="120" r="60" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Person icon -->
  <circle cx="300" cy="90" r="25" fill="white" opacity="0.9"/>
  <path d="M 270 150 Q 270 130 300 130 Q 330 130 330 150 L 330 180 Q 330 190 320 190 L 280 190 Q 270 190 270 180 Z" fill="white" opacity="0.9"/>
  
  <!-- Checkmarks -->
  <circle cx="150" cy="280" r="30" fill="rgba(255,255,255,0.2)"/>
  <text x="150" y="295" font-size="40" text-anchor="middle" fill="white">✓</text>
  
  <circle cx="450" cy="280" r="30" fill="rgba(255,255,255,0.2)"/>
  <text x="450" y="295" font-size="40" text-anchor="middle" fill="white">✓</text>
  
  <!-- Text -->
  <text x="300" y="250" font-size="28" text-anchor="middle" fill="white" font-weight="bold">Join the Community</text>
  <text x="300" y="350" font-size="14" text-anchor="middle" fill="rgba(255,255,255,0.9)">Create account and share your portfolio</text>
</svg>
